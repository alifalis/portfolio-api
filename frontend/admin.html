<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration du portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-gray-900 text-white p-6">
    <h1 class="text-3xl font-bold">Administration Portfolio</h1>
    <a href="index.html" class="text-blue-300 underline">Retour au portfolio</a>
</header>

<main class="p-6 max-w-2xl mx-auto">

    <section class="bg-white p-4 rounded shadow mb-6">
        <h2 class="text-xl font-bold mb-4">Que veux-tu ajouter ?</h2>
        <button class="bg-blue-600 text-white px-4 py-2 rounded">
            Ajouter une formation
        </button>
        <button class="bg-gray-400 text-white px-4 py-2 rounded ml-2" disabled>
            Ajouter une expérience (bientôt)
        </button>
    </section>

    <section class="bg-white p-4 rounded shadow">
        <h2 class="text-xl font-bold mb-4">Ajouter une formation</h2>

        <form id="education-form" class="space-y-3">
            <input id="degree" class="w-full border p-2" type="text" placeholder="Diplôme" required>
            <input id="institution" class="w-full border p-2" type="text" placeholder="Établissement" required>
            <input id="start_year" class="w-full border p-2" type="number" placeholder="Année de début" required>
            <input id="end_year" class="w-full border p-2" type="number" placeholder="Année de fin">
            <textarea id="description" class="w-full border p-2" placeholder="Description" required></textarea>

            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">
                Ajouter
            </button>
        </form>

        <p id="message" class="mt-4"></p>
    </section>

</main>

<script src="admin.js"></script>
</body>
</html>
